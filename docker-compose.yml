services:
  mediamtx:
    image: bluenviron/mediamtx:1.17.1
    ports:
      - "8554:8554"   # RTSP
      - "${BIRBER_WEBRTC_PORT:-8889}:8889"   # WebRTC HTTP
      - "8189:8189/udp"   # WebRTC ICE UDP
      - "8189:8189/tcp"   # WebRTC ICE TCP fallback
      - "9997:9997"   # API
    volumes:
      - ./host/mediamtx.yml:/mediamtx.yml:ro
    environment:
      - BIRBER_HOST_IP=${BIRBER_HOST_IP:-}
    restart: unless-stopped

  birber:
    build: .
    depends_on:
      - mediamtx
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
      - birber-models:/app/models
    ports:
      - "${BIRBER_WS_PORT:-8765}:8765"     # WebSocket (standalone)
      - "${BIRBER_WEB_PORT:-8080}:8080"   # Web server (API + WebSocket + images)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    environment:
      - TRANSFORMERS_CACHE=/app/models/huggingface
      - YOLO_CONFIG_DIR=/app/models/ultralytics
      - BIRBER_RTMP_ENABLED=${BIRBER_RTMP_ENABLED:-}
      - BIRBER_CAPTURE_URL=${BIRBER_CAPTURE_URL:-}
      - BIRBER_STREAM_KEY=${BIRBER_STREAM_KEY:-}

  # Cloudflare Tunnel — uncomment and set TUNNEL_TOKEN to enable
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   depends_on:
  #     - birber
  #   command: tunnel run
  #   environment:
  #     - TUNNEL_TOKEN=${TUNNEL_TOKEN}
  #   restart: unless-stopped

volumes:
  birber-models:
